<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Database Initialization Required</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}?v={{ time.time() }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .init-container {
            max-width: 600px;
            margin: 100px auto;
            text-align: center;
            background-color: #3A2831;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .init-icon {
            font-size: 48px;
            color: #C6AC48;
            margin-bottom: 20px;
        }

        .init-title {
            font-size: 24px;
            margin-bottom: 20px;
        }

        .init-message {
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .init-button {
            padding: 12px 24px;
            background-color: #C6AC48;
            color: #2E1724;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .init-button:hover {
            background-color: #E6C160;
            transform: scale(1.05);
        }

        #loading-spinner {
            display: none;
            margin: 20px auto;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(198, 172, 72, 0.3);
            border-radius: 50%;
            border-top: 4px solid #C6AC48;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="init-container">
        <div class="init-icon">
            <i class="fas fa-database"></i>
        </div>
        <h1 class="init-title">Database Setup Required</h1>
        <p class="init-message">
            Your application needs to be initialized with required database tables. This is a one-time setup that will create all necessary tables and add sample data.
        </p>
        <button id="init-button" class="init-button" onclick="initializeDatabase()">Initialize Database</button>

        <div id="loading-spinner">
            <div class="spinner"></div>
        </div>

        <p id="status-message" style="margin-top: 20px; display: none;"></p>
    </div>

    <script>
        function initializeDatabase() {
            const statusMessage = document.getElementById('status-message');
            const loadingSpinner = document.getElementById('loading-spinner');
            const initButton = document.getElementById('init-button');

            statusMessage.style.display = 'block';
            loadingSpinner.style.display = 'block';
            statusMessage.textContent = 'Initializing database...';
            initButton.disabled = true;
            fetch('/safe-init-db')
                .then(response => response.json())
                .then(data => {
                    if (data.success) {
                        statusMessage.textContent = 'Database initialized successfully! Redirecting to dashboard...';
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 2000);
                    } else {
                        return fetch('/init-db');
                    }
                })
                .then(response => {
                    if (response) return response.json();
                })
                .then(data => {
                    if (data) {
                        statusMessage.textContent = 'Database initialized! Redirecting to dashboard...';
                        setTimeout(() => {
                            window.location.href = '/dashboard';
                        }, 2000);
                    }
                })
                .catch(error => {
                    console.error('Error:', error);
                    statusMessage.textContent = 'An error occurred. Please try refreshing the page and try again.';
                    loadingSpinner.style.display = 'none';
                    initButton.disabled = false;
                });
        }
    </script>
</body>
</html>
