version: '3.8'

services:
  db:
    image: postgres:latest
    restart: always
    environment:
      POSTGRES_USER: fitness_admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: fitness_app
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  web:
    build: .
    depends_on:
      - db
    restart: always
    environment:
      DATABASE_URL: postgresql://fitness_admin:securepassword@db:5432/fitness_app
    ports:
      - "5001:5001"
    volumes:
      - .:/app

volumes:
  db_data:
